[alembic]
script_location = migration
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql://postgres.jrxmhliozrymgccdpobv:+*wa?T33L!_w.qg@aws-1-eu-west-2.pooler.supabase.com:5432/postgres

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
